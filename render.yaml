services:
  # ─── Backend API (Express + Socket.IO) ────────────────────────────────────────
  - type: web
    name: aquafeed-erp-api
    runtime: node
    region: oregon   # Change to: singapore, frankfurt, ohio, virginia as needed
    plan: free        # Upgrade to starter ($7/mo) for always-on + custom domain

    # Render builds from the repo root, so point to the server subfolder
    rootDir: server
    buildCommand: npm install
    startCommand: npm start

    # Node.js version
    envVarGroups: []

    envVars:
      - key: NODE_ENV
        value: production

      - key: PORT
        value: 10000   # Render assigns its own port via $PORT, this is a default

      # ⚠️  Set these in the Render dashboard (not here — they're secrets):
      # - key: MONGODB_URI
      #   value: mongodb+srv://<user>:<pass>@cluster.mongodb.net/aquafeed

      # - key: JWT_SECRET
      #   value: <your_strong_random_secret>

      - key: CORS_ORIGINS
        value: https://aqua-feed-erp.vercel.app

      - key: JWT_EXPIRES_IN
        value: 7d

    healthCheckPath: /api/health

    # Auto-deploy when main branch is pushed
    autoDeploy: true
