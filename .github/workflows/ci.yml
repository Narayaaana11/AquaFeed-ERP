name: CI — AquaFeed ERP

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ─── Lint & Build Frontend (Vercel) ──────────────────────────────────────────
  frontend:
    name: Frontend — Build & Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: aquaflow-erp

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: aquaflow-erp/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build (production)
        run: npm run build
        env:
          # Set these secrets in GitHub: Settings → Secrets and variables → Actions
          # VITE_API_URL → your Render backend URL e.g. https://aquafeed-erp-api.onrender.com
          # VITE_WS_URL  → same as VITE_API_URL (Socket.IO uses HTTP upgrade)
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          VITE_WS_URL: ${{ secrets.VITE_WS_URL }}

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: aquaflow-erp/dist
          retention-days: 7

  # ─── Validate Backend (Render) ───────────────────────────────────────────────
  backend:
    name: Backend — Validate
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Syntax check entry point
        run: node --check src/index.js
